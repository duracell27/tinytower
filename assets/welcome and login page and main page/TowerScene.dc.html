<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .tw-scroll::-webkit-scrollbar{width:0;height:0}
  </style>
  <script src="./image-slot.js"></script>
</helmet>

<div class="tw-scroll" style="width:100%;height:100%;overflow-y:auto;background:#DCEFF6 url('./img/welcome-bg.png') center/cover no-repeat;font-family:Fredoka,system-ui,sans-serif;box-sizing:border-box">

  <div style="display:flex;flex-direction:column;gap:13px;padding:170px 14px 124px">

    <!-- ============ FLOOR 1 · КОНДИТЕРСЬКА (green) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#74C44F,#5DA83C);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.26);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">2</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(40,70,25,0.4)">КОНДИТЕРСЬКА</span>
        <span style="margin-left:auto;display:flex;gap:1px;font-size:13px;line-height:1">
          <span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:rgba(0,0,0,0.18)">★</span>
        </span>
      </div>
      <div style="display:flex;gap:7px;padding:9px;background:#D2EAB4">
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Булки" state="buy" label="Закупити" sub="1 250" slot-id="c-bulky" img-src="img/bulky.png" card-bg="#F2F8E9" name-color="#5B963A" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Пирожені" state="delivery" label="02:45" sub="Доставка" slot-id="c-cupcake" img-src="img/cupcake.png" card-bg="#F2F8E9" name-color="#5B963A" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Торти" state="layout" label="Викласти" sub="2 300" slot-id="c-cake" img-src="img/cake.png" card-bg="#F2F8E9" name-color="#5B963A" hint-size="100%,150px" style="display:block"></dc-import></div>
      </div>
    </div>

    <!-- ============ FLOOR 2 · ПРАЛЬНЯ (turquoise) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#43BCAA,#2E9E8E);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.26);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">3</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(20,70,60,0.4)">ПРАЛЬНЯ</span>
        <span style="margin-left:auto;display:flex;gap:1px;font-size:13px;line-height:1">
          <span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:rgba(0,0,0,0.18)">★</span>
        </span>
      </div>
      <div style="display:flex;gap:7px;padding:9px;background:#BEE6DD">
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Прання" state="buy" label="Закупити" sub="1 100" slot-id="l-wash" img-src="img/wash.png" card-bg="#EBF7F3" name-color="#2E9384" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Сушка" state="delivery" label="05:10" sub="Доставка" slot-id="l-dry" img-src="img/dry.png" card-bg="#EBF7F3" name-color="#2E9384" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Відбілювання" state="hire" label="Найняти" sub="500" slot-id="l-bleach" img-src="img/bleach.png" card-bg="#EBF7F3" name-color="#2E9384" hint-size="100%,150px" style="display:block"></dc-import></div>
      </div>
    </div>

    <!-- ============ FLOOR 3 · КАВ’ЯРНЯ (yellow) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#F2B838,#E09E10);box-shadow:inset 0 1px 0 rgba(255,255,255,0.45)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.3);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">4</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(120,80,0,0.4)">КАВ’ЯРНЯ</span>
        <span style="margin-left:auto;display:flex;gap:1px;font-size:13px;line-height:1">
          <span style="color:#FFE27A;text-shadow:0 1px 1px rgba(120,80,0,0.45)">★</span><span style="color:#FFE27A;text-shadow:0 1px 1px rgba(120,80,0,0.45)">★</span><span style="color:#FFE27A;text-shadow:0 1px 1px rgba(120,80,0,0.45)">★</span><span style="color:#FFE27A;text-shadow:0 1px 1px rgba(120,80,0,0.45)">★</span><span style="color:rgba(0,0,0,0.16)">★</span>
        </span>
      </div>
      <div style="display:flex;gap:7px;padding:9px;background:#F7E4AC">
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Кава" state="buy" label="Закупити" sub="900" slot-id="k-coffee" img-src="img/coffee.png" card-bg="#FDF8E9" name-color="#B5871E" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Млинці" state="sell" label="03:30" sub="Продаж" slot-id="k-pancake" img-src="img/pancake.png" card-bg="#FDF8E9" name-color="#B5871E" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Десерти" state="collect" label="Зібрати" sub="1 400" slot-id="k-dessert" img-src="img/dessert.png" card-bg="#FDF8E9" name-color="#B5871E" hint-size="100%,150px" style="display:block"></dc-import></div>
      </div>
    </div>

    <!-- ============ FLOOR 5 · ПАРФУМЕРІЯ (purple) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#A87BE0,#8B5CC9);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.26);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">5</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(60,30,90,0.4)">ПАРФУМЕРІЯ</span>
        <span style="margin-left:auto;display:flex;gap:1px;font-size:13px;line-height:1">
          <span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:rgba(0,0,0,0.18)">★</span>
        </span>
      </div>
      <div style="display:flex;gap:7px;padding:9px;background:#DECFF2">
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Аромати" state="buy" label="Закупити" sub="1 500" slot-id="p-aroma" card-bg="#F4EEFB" name-color="#7B52BC" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Мило" state="delivery" label="04:20" sub="Доставка" slot-id="p-soap" card-bg="#F4EEFB" name-color="#7B52BC" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Свічки" state="layout" label="Викласти" sub="2 100" slot-id="p-candle" card-bg="#F4EEFB" name-color="#7B52BC" hint-size="100%,150px" style="display:block"></dc-import></div>
      </div>
    </div>

    <!-- ============ FLOOR 6 · МОРОЗИВО (blue) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#52A6E2,#3B8BCB);box-shadow:inset 0 1px 0 rgba(255,255,255,0.4)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.26);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">6</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(20,50,90,0.4)">МОРОЗИВО</span>
        <span style="margin-left:auto;display:flex;gap:1px;font-size:13px;line-height:1">
          <span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:#FFD23E;text-shadow:0 1px 1px rgba(120,80,0,0.4)">★</span><span style="color:rgba(0,0,0,0.18)">★</span>
        </span>
      </div>
      <div style="display:flex;gap:7px;padding:9px;background:#C7E2F4">
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Пломбір" state="buy" label="Закупити" sub="1 050" slot-id="i-plombir" card-bg="#EAF3FB" name-color="#2E78B5" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Шейки" state="sell" label="03:15" sub="Продаж" slot-id="i-shake" card-bg="#EAF3FB" name-color="#2E78B5" hint-size="100%,150px" style="display:block"></dc-import></div>
        <div style="flex:1;min-width:0"><dc-import name="Production" title="Сорбет" state="collect" label="Зібрати" sub="1 350" slot-id="i-sorbet" card-bg="#EAF3FB" name-color="#2E78B5" hint-size="100%,150px" style="display:block"></dc-import></div>
      </div>
    </div>

    <!-- ============ FLOOR 1 · ГОТЕЛЬ (slate · technical) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#8090A6,#5F6E84);box-shadow:inset 0 1px 0 rgba(255,255,255,0.35)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.24);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.28);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">1</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(30,40,60,0.4)">ГОТЕЛЬ</span>
        <span style="margin-left:auto;display:inline-flex;align-items:center;padding:2px 9px;border-radius:9px;background:rgba(255,255,255,0.2);font-weight:600;font-size:10px;letter-spacing:0.4px;color:#fff">ТЕХНІЧНИЙ</span>
      </div>
      <div style="display:flex;align-items:center;gap:11px;padding:11px;background:#D9DEE7">
        <image-slot id="t-hotel" src="img/hotel.png" style="width:98px;height:66px;flex:none" shape="rounded" radius="13" fit="cover" placeholder="готель"></image-slot>
        <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:7px">
          <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;background:{{ vacancyBg }};box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04),0 1px 1px rgba(0,0,0,0.06);font-weight:600;font-size:11.5px;color:{{ vacancyColor }}">
            <span style="width:8px;height:8px;border-radius:50%;flex:none;background:{{ vacancyDot }}"></span>{{ vacancyText }}
          </span>
          <div style="display:flex;align-items:baseline;gap:6px">
            <span style="font-weight:600;font-size:10.5px;color:#6E7686;letter-spacing:0.3px">ЗАЙНЯТО</span>
            <span style="font-weight:700;font-size:17px;color:#41495A;line-height:1"><span style="color:#5E6E84">{{ hotelOccupied }}</span><span style="color:#9AA2B0">/{{ hotelTotal }}</span></span>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ FLOOR 0 · ВЕСТИБЮЛЬ (slate · technical) ============ -->
    <div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 12px -2px rgba(60,80,45,0.18);background:#fff">
      <div style="display:flex;align-items:center;height:31px;padding:0 12px;background:linear-gradient(180deg,#8090A6,#5F6E84);box-shadow:inset 0 1px 0 rgba(255,255,255,0.35)">
        <span style="flex:none;width:21px;height:21px;border-radius:6px;background:rgba(255,255,255,0.24);box-shadow:inset 0 0 0 1px rgba(255,255,255,0.28);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;margin-right:9px">0</span>
        <span style="font-weight:700;font-size:15px;color:#fff;letter-spacing:0.6px;text-shadow:0 1px 1px rgba(30,40,60,0.4)">ВЕСТИБЮЛЬ</span>
        <span style="margin-left:auto;display:inline-flex;align-items:center;padding:2px 9px;border-radius:9px;background:rgba(255,255,255,0.2);font-weight:600;font-size:10px;letter-spacing:0.4px;color:#fff">ТЕХНІЧНИЙ</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:9px;padding:11px;background:#D9DEE7">
        <div style="display:flex;align-items:center;gap:11px">
          <image-slot id="t-lobby" src="img/lobby.png" style="width:98px;height:66px;flex:none" shape="rounded" radius="13" fit="cover" placeholder="вестибюль"></image-slot>
          <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:5px">
            <span style="font-weight:600;font-size:13px;color:#41495A">Новий відвідувач</span>
            <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:6px;padding:3px 11px 3px 4px;border-radius:11px;background:#fff;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04),0 1px 1px rgba(0,0,0,0.06)">
              <span style="width:19px;height:19px;border-radius:50%;flex:none;background:radial-gradient(circle at 35% 30%,#9FD2F5,#5EA6E0);display:flex;align-items:center;justify-content:center">
                <svg viewBox="0 0 24 24" width="11" height="11" fill="#fff"><circle cx="12" cy="8" r="3.6"></circle><path d="M5 20c0-3.6 3-5.8 7-5.8s7 2.2 7 5.8z"></path></svg>
              </span>
              <span style="font-weight:700;font-size:14px;color:#41495A">{{ visitors }}</span>
            </span>
          </div>
        </div>
        <sc-if value="{{ hasVisitors }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;align-items:center;justify-content:center;gap:7px;padding:9px 12px;border-radius:11px;background:linear-gradient(180deg,#72C24F,#5BA63C);color:#fff;font-weight:700;font-size:13.5px;letter-spacing:0.3px;text-shadow:0 1px 1px rgba(0,0,0,0.2);box-shadow:0 2px 0 #4A8A2E,inset 0 1px 0 rgba(255,255,255,0.4);cursor:pointer">
            <svg viewBox="0 0 24 24" width="16" height="16" style="flex:none" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="3" width="12" height="18" rx="1.6"></rect><path d="M12 8l-2.4 2.6h4.8z" fill="#fff" stroke="none"></path></svg>
            <span>Підняти на ліфті</span>
          </div>
        </sc-if>
      </div>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:402,&quot;height&quot;:760}}">class Component extends DCLogic {
  renderVals() {
    const visitors = 3;
    const hotelOccupied = 20;
    const hotelTotal = 32;
    const hasVacancy = hotelOccupied < hotelTotal;
    return {
      visitors,
      hasVisitors: visitors > 0,
      hotelOccupied,
      hotelTotal,
      vacancyText: hasVacancy ? 'Є вільні місця' : 'Немає вільних місць',
      vacancyColor: hasVacancy ? '#3C8A2C' : '#B5483A',
      vacancyBg: hasVacancy ? '#E7F4DF' : '#F8E6E3',
      vacancyDot: hasVacancy ? '#5BA63C' : '#D2604F',
    };
  }
}</script>
</body>
</html>
