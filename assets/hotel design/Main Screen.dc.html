<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{margin:0}</style>
</helmet>

<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:48px;background:#E7E5DF;font-family:Nunito,system-ui,sans-serif">
  <div style="display:flex;gap:48px;align-items:flex-start">

    <div style="flex:none;width:402px">
      <div style="font-family:Fredoka,sans-serif;font-weight:500;font-size:14px;color:#6E6A62;margin-bottom:12px;padding-left:4px">Головний екран</div>
      <x-import component="IOSDevice" from="./ios-frame.jsx" hint-size="402px,874px">

        <dc-import name="TowerScene" hint-size="100%,100%" style="display:block;width:100%;height:100%"></dc-import>

        <!-- TOP BAR -->
        <div style="position:absolute;top:54px;left:14px;right:14px;z-index:40">
          <div style="position:relative;border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,0.85);box-shadow:0 8px 22px rgba(70,90,55,0.16),inset 0 1px 1px rgba(255,255,255,0.95);background:linear-gradient(150deg,rgba(255,255,255,0.9),rgba(255,255,255,0.72));backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%)">
            <div style="position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.45),transparent);pointer-events:none"></div>
            <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 12px">
              <!-- avatar + level -->
              <div style="display:flex;align-items:center;gap:11px">
                <div style="position:relative;width:50px;height:50px;border-radius:50%;background:conic-gradient(#5FC24E 0%,#3FA535 64%,rgba(60,120,40,0.14) 64%,rgba(60,120,40,0.14) 100%);padding:3.5px;box-shadow:0 2px 6px rgba(70,140,50,0.25)">
                  <div style="width:100%;height:100%;border-radius:50%;background:linear-gradient(160deg,#74D3C4,#3FA9A0);display:flex;align-items:center;justify-content:center;font-family:Fredoka;font-weight:600;font-size:21px;color:#fff;text-shadow:0 1px 2px rgba(20,90,80,0.4);border:2px solid #fff;box-sizing:border-box">D</div>
                  <span style="position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);font-family:Fredoka;font-weight:600;font-size:9px;color:#fff;background:#3FA535;padding:1px 7px;border-radius:7px;box-shadow:0 1px 3px rgba(40,110,30,0.4)">7</span>
                </div>
                <div style="display:flex;flex-direction:column;gap:3px">
                  <span style="font-family:Fredoka;font-weight:600;font-size:17px;color:#27331F;line-height:1">Duracell</span>
                  <span style="font-family:Fredoka;font-weight:500;font-size:11px;color:#7C8A6E">Level 7 · 640/1000 XP</span>
                </div>
              </div>
              <!-- currencies stacked -->
              <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
                <div style="display:flex;align-items:center;gap:6px;background:#fff;padding:4px 9px 4px 5px;border-radius:13px;box-shadow:0 1px 3px rgba(120,110,60,0.16),inset 0 1px 1px rgba(255,255,255,0.9)">
                  <span style="width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFE69B,#F2B330);box-shadow:inset 0 0 0 2px rgba(255,255,255,0.55),0 1px 2px rgba(180,130,30,0.3)"></span>
                  <span style="font-family:Fredoka;font-weight:600;font-size:14px;color:#C28A22">2 480</span>
                </div>
                <div style="display:flex;align-items:center;gap:6px;background:#fff;padding:4px 9px 4px 6px;border-radius:13px;box-shadow:0 1px 3px rgba(60,120,140,0.16),inset 0 1px 1px rgba(255,255,255,0.9)">
                  <span style="width:14px;height:14px;background:linear-gradient(150deg,#8FE6F2,#3FB8D6);transform:rotate(45deg);border-radius:3px;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.6)"></span>
                  <span style="font-family:Fredoka;font-weight:600;font-size:14px;color:#2592AB">143</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- BOTTOM NAV (Honey Hollow style) -->
        <div style="position:absolute;bottom:30px;left:16px;right:16px;z-index:40">
          <div style="position:relative;border-radius:30px;overflow:hidden;border:1px solid rgba(255,255,255,0.9);box-shadow:0 12px 30px rgba(60,90,50,0.2),inset 0 1px 1px rgba(255,255,255,0.95);background:linear-gradient(150deg,rgba(255,255,255,0.9),rgba(255,255,255,0.75));backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%)">
            <div style="position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.45),transparent);pointer-events:none"></div>
            <div style="position:relative;display:flex;align-items:center;justify-content:space-between;padding:9px 10px">
              <!-- Tower (active) -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 18px;border-radius:20px;background:linear-gradient(180deg,#E4F4D8,#D3EBBF);box-shadow:inset 0 1px 1px rgba(255,255,255,0.8),0 1px 4px rgba(90,160,60,0.18)">
                <div style="display:flex;flex-direction:column;gap:2px;align-items:center">
                  <span style="width:10px;height:4px;border-radius:1.5px;background:#3C9A34"></span>
                  <span style="width:15px;height:4px;border-radius:1.5px;background:#3C9A34"></span>
                  <span style="width:20px;height:4px;border-radius:1.5px;background:#3C9A34"></span>
                </div>
                <span style="font-family:Fredoka;font-weight:600;font-size:11px;color:#3C9A34">Вежа</span>
              </div>
              <!-- City -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 14px">
                <div style="display:flex;gap:2px;align-items:flex-end;height:20px">
                  <span style="width:6px;height:13px;border-radius:2px 2px 0 0;background:#3A4232"></span>
                  <span style="width:6px;height:20px;border-radius:2px 2px 0 0;background:#3A4232"></span>
                  <span style="width:6px;height:10px;border-radius:2px 2px 0 0;background:#3A4232"></span>
                </div>
                <span style="font-family:Fredoka;font-weight:500;font-size:11px;color:#3A4232">Місто</span>
              </div>
              <!-- Shop -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 14px">
                <div style="position:relative;width:20px;height:20px">
                  <div style="position:absolute;bottom:0;width:20px;height:14px;border-radius:3px 3px 4px 4px;background:#3A4232"></div>
                  <div style="position:absolute;top:1px;left:5px;width:10px;height:8px;border:2px solid #3A4232;border-bottom:none;border-radius:6px 6px 0 0;box-sizing:border-box"></div>
                </div>
                <span style="font-family:Fredoka;font-weight:500;font-size:11px;color:#3A4232">Магазин</span>
              </div>
              <!-- Profile -->
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px 14px">
                <div style="display:flex;flex-direction:column;align-items:center;gap:1.5px;height:20px;justify-content:center">
                  <span style="width:9px;height:9px;border-radius:50%;background:#3A4232"></span>
                  <span style="width:16px;height:9px;border-radius:8px 8px 0 0;background:#3A4232"></span>
                </div>
                <span style="font-family:Fredoka;font-weight:500;font-size:11px;color:#3A4232">Профіль</span>
              </div>
            </div>
          </div>
        </div>

      </x-import>
    </div>

  </div>
</div>
</x-dc>
</body>
</html>
